[tools]
rust = "latest"
opencode = "latest"
claude-code = "latest"

[tasks.web-gameboard]
description = "Compose Multiplatform (Wasm) + Ktor Server 起動"
dir = "tools"
run = "amper.bat build --module web-gameboard && amper.bat run --module web-server"

[tasks."web-gameboard:build"]
description = "Compose Multiplatform (Wasm) ビルド"
dir = "tools"
run = "amper.bat build --module web-gameboard"


[tasks.codeql-create]
run = """
codeql database create .codeql-db --db-cluster --language=javascript,rust --source-root=. --build-mode=none --overwrite
"""

[tasks."bs-sim"]
description = "Run BSRust deck simulation"
dir = "BSRust"
run = "cargo build --quiet && cargo run -- deck-fara.yaml deck-kogyo.yaml"
