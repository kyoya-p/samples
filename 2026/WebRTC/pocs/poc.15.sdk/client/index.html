<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebRTC SDK Test - poc.15.sdk</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f2f5; }
        .status-panel { display: flex; gap: 20px; margin-bottom: 20px; padding: 10px; background: #eee; }
        #logArea { width: 100%; height: 300px; margin-top: 10px; border: 1px solid #ccc; padding: 10px; overflow-y: scroll; background: white; }
    </style>
</head>
<body>
    <h1>WebRTC SDK Test</h1>
    <div class="status-panel">
        <div>ICE: <span id="iceStatus">disconnected</span></div>
        <div>DataChannel: <span id="dcStatus">closed</span></div>
        <div>Peers: <span id="peerCount">0</span></div>
    </div>
    <input type="text" id="msgInput" placeholder="Message" disabled>
    <button id="sendBtn" disabled>Send</button>
    <div id="logArea"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/sdk/webrtc-sdk.js"></script>
    <script src="test-client.js"></script>
</body>
</html>
