services:
  client1:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "8081:6080"
    environment:
      - TARGET_URL=http://webrtc-full-stack-28002.japaneast.azurecontainer.io:3000/index.html
    volumes:
      - .:/app

  client2:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "8082:6080"
    environment:
      - TARGET_URL=http://webrtc-full-stack-28002.japaneast.azurecontainer.io:3000/index.html
    volumes:
      - .:/app
