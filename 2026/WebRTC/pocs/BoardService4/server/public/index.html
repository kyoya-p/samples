<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRTC Click Sync</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .boxes { display: flex; gap: 20px; width: 100%; max-width: 1000px; margin-top: 20px; }
        .box-container { flex: 1; text-align: center; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 5px; cursor: crosshair; touch-action: none; background: #fff; box-sizing: border-box; }
        canvas.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 5px; margin: 5px; }
        #logArea { width: 100%; max-width: 1000px; height: 150px; margin-top: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: monospace; resize: vertical; box-sizing: border-box; }
    </style>
</head>
<body>
    <h1>WebRTC Click Sync (Fade Out)</h1>
    <div>
        <label><input type="checkbox" id="chkForceTurn"> Force TURN (Relay only)</label>
        <button id="btnConnect" style="background:#28a745">Connect P2P (WebRTC)</button>
        <button id="btnClear" style="background:#666">Clear All</button>
    </div>

    <div class="boxes">
        <div class="box-container">
            <h3>Local (Drag to draw)</h3>
            <canvas id="localCanvas"></canvas>
        </div>
        <div class="box-container">
            <h3>Remote (P2P Sync)</h3>
            <canvas id="remoteCanvas"></canvas>
        </div>
    </div>
    
    <textarea id="logArea" readonly placeholder="Logs will appear here..."></textarea>

    <script type="module" src="./build/tasks/_client_linkJs/client.mjs"></script>
    <script>
        const logArea = document.getElementById('logArea');
        function appendLog(type, args) {
            const msg = Array.from(args).map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
            logArea.value += `[${type}] ${msg}\n`;
            logArea.scrollTop = logArea.scrollHeight;
        }
        console.log = (...args) => appendLog('INFO', args);
        console.error = (...args) => appendLog('ERROR', args);

        const signalingHost = window.location.hostname === 'localhost' ? 'localhost' : (window.location.hostname || 'signaling');
        const socket = io(`http://${signalingHost}:3000`);

        window.emitSignal = (data) => socket.emit('signal', data);
        socket.on('signal', (data) => { if (window.onRemoteSignal) window.onRemoteSignal(data); });

        const localCanvas = document.getElementById('localCanvas');
        const remoteCanvas = document.getElementById('remoteCanvas');
        const localCtx = localCanvas.getContext('2d');
        const remoteCtx = remoteCanvas.getContext('2d');

        let localDots = [];
        let remoteDots = [];
        window.localDots = localDots;
        window.remoteDots = remoteDots;

        function setCanvasEnabled(enabled) {
            localCanvas.classList.toggle('disabled', !enabled);
            console.log(enabled ? "Drawing enabled" : "Drawing disabled");
        }
        window.setCanvasEnabled = setCanvasEnabled;

        function initCanvas(canvas) {
            // clientWidth/Height はボーダーを含まない純粋なコンテンツ領域のサイズを返す
            canvas.width = canvas.clientWidth || 400;
            canvas.height = canvas.clientHeight || 400;
        }
        window.onresize = () => { initCanvas(localCanvas); initCanvas(remoteCanvas); };

        function addDot(list, x, y, color) {
            list.push({ x, y, color, startTime: Date.now() });
        }

        function animate() {
            const now = Date.now();
            const FADE_DURATION = 60000;
            [ {ctx: localCtx, dots: localDots, canvas: localCanvas}, 
              {ctx: remoteCtx, dots: remoteDots, canvas: remoteCanvas} ].forEach(set => {
                if (set.canvas.width === 0) initCanvas(set.canvas);
                set.ctx.clearRect(0, 0, set.canvas.width, set.canvas.height);
                set.dots = set.dots.filter(dot => {
                    const elapsed = now - dot.startTime;
                    if (elapsed >= FADE_DURATION) return false;
                    set.ctx.globalAlpha = 1.0 - (elapsed / FADE_DURATION);
                    set.ctx.fillStyle = dot.color;
                    set.ctx.beginPath();
                    set.ctx.arc(dot.x, dot.y, 10, 0, Math.PI * 2);
                    set.ctx.fill();
                    return true;
                });
                if (set.ctx === localCtx) localDots = set.dots; else remoteDots = set.dots;
            });
            window.localDots = localDots; window.remoteDots = remoteDots;
            requestAnimationFrame(animate);
        }
        animate();

        window.drawRemotePoint = (xRel, yRel) => {
            addDot(remoteDots, xRel * remoteCanvas.width, yRel * remoteCanvas.height, "#d83b01");
        };

        let isDrawing = false;
        function handleMove(e) {
            if (!isDrawing) return;
            
            let xAbs, yAbs;
            if (e.touches && e.touches.length > 0) {
                const rect = localCanvas.getBoundingClientRect();
                // clientLeft/Top はボーダーの幅。これを引くことでコンテンツ領域の左上を (0,0) にする
                xAbs = (e.touches[0].clientX - rect.left - localCanvas.clientLeft);
                yAbs = (e.touches[0].clientY - rect.top - localCanvas.clientTop);
            } else {
                // マウスイベントの場合は offsetX/Y が最も正確（要素内座標）
                xAbs = e.offsetX;
                yAbs = e.offsetY;
            }
            
            // 内部解像度へのスケーリング
            // initCanvasで canvas.width = clientWidth としているため、通常は 1.0 倍
            const scaleX = localCanvas.width / localCanvas.clientWidth;
            const scaleY = localCanvas.height / localCanvas.clientHeight;
            xAbs *= scaleX;
            yAbs *= scaleY;

            const xRel = xAbs / localCanvas.width;
            const yRel = yAbs / localCanvas.height;
            
            addDot(localDots, xAbs, yAbs, "#0078d4");
            if (window.webrtcController) window.webrtcController.sendPoint(xRel, yRel);
        }

        localCanvas.onmousedown = (e) => { isDrawing = true; handleMove(e); };
        window.onmouseup = () => { isDrawing = false; };
        localCanvas.onmousemove = handleMove;
        localCanvas.ontouchstart = (e) => { isDrawing = true; handleMove(e); if(e.cancelable) e.preventDefault(); };
        localCanvas.ontouchmove = (e) => { handleMove(e); if(e.cancelable) e.preventDefault(); };
        localCanvas.ontouchend = () => { isDrawing = false; };

        window.onload = () => {
            initCanvas(localCanvas); initCanvas(remoteCanvas);
            setCanvasEnabled(false);
            socket.emit('join', 'demo-room');
            document.getElementById('btnConnect').onclick = () => window.webrtcController.connectP2P();
            document.getElementById('btnClear').onclick = () => { localDots = []; remoteDots = []; };
        };
    </script>
</body>
</html>
