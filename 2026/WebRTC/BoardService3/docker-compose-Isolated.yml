version: '3.8'

networks:
  net_a:
    ipam:
      config:
        - subnet: 172.20.0.0/24
  net_b:
    ipam:
      config:
        - subnet: 172.21.0.0/24

services:
  client_a:
    image: browserless/chrome:latest
    networks:
      net_a:
        ipv4_address: 172.20.0.10
    ports:
      - "8081:3000" # Browserless GUI/WebSocket

  client_b:
    image: browserless/chrome:latest
    networks:
      net_b:
        ipv4_address: 172.21.0.10
    ports:
      - "8082:3000" # Browserless GUI/WebSocket
