<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebRTC noVNC POC</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #control-bar { padding: 10px; background: #333; display: flex; gap: 10px; align-items: center; }
        #screen { flex: 1; overflow: hidden; position: relative; }
        #status { font-size: 12px; color: #aaa; }
        button { padding: 8px 16px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #555; }
    </style>
</head>
<body>
    <div id="control-bar">
        <button id="btnConnect">VNCに接続 (WebRTC)</button>
        <span id="status">準備完了</span>
    </div>
    <div id="screen"></div>

    <script type="module">
        import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc/core/rfb.js';

        const signalingHost = window.location.hostname === 'localhost' ? 'localhost' : (window.location.hostname || 'signaling');
        const socket = io(`http://${signalingHost}:3000`);
        
        const btnConnect = document.getElementById('btnConnect');
        const statusEl = document.getElementById('status');
        let peerConnection;
        let dataChannel;
        let rfb;

        async function initWebRTC() {
            statusEl.innerText = "ICEサーバ取得中...";
            try {
                const iceResp = await fetch('/ice-servers');
                const iceServers = await iceResp.json();

                peerConnection = new RTCPeerConnection({ iceServers });
                
                dataChannel = peerConnection.createDataChannel("vnc-data", { negotiated: false });
                dataChannel.binaryType = "arraybuffer";

                dataChannel.onopen = () => {
                    statusEl.innerText = "DataChannel オープン。VNC初期化中...";
                    setupVNCProxy();
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('signal', { type: 'candidate', candidate: event.candidate.toJSON(), room: 'vnc-room' });
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('signal', { type: offer.type, sdp: offer.sdp, room: 'vnc-room' });
            } catch (e) {
                statusEl.innerText = "エラー: " + e.message;
                console.error(e);
            }
        }

        socket.on('signal', async (data) => {
            if (!peerConnection) return;
            if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
            } else if (data.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function setupVNCProxy() {
            const fakeWS = {
                send: (data) => {
                    if (dataChannel.readyState === 'open') dataChannel.send(data);
                },
                close: () => dataChannel.close(),
                readyState: WebSocket.OPEN,
                onopen: null,
                onmessage: null,
                onclose: null,
                onerror: null,
                binaryType: 'arraybuffer'
            };

            dataChannel.onmessage = (event) => {
                if (fakeWS.onmessage) fakeWS.onmessage({ data: event.data });
            };

            rfb = new RFB(document.getElementById('screen'), 'ws://localhost', {
                shared: true,
                credentials: { password: 'password123' }
            });

            rfb._sock._websocket = fakeWS;
            setTimeout(() => { if (fakeWS.onopen) fakeWS.onopen(); }, 100);

            rfb.addEventListener("connect", () => {
                statusEl.innerText = "VNC 接続成功";
                btnConnect.disabled = true;
            });
            rfb.addEventListener("disconnect", () => {
                statusEl.innerText = "VNC 切断";
                btnConnect.disabled = false;
            });
        }

        btnConnect.onclick = () => {
            socket.emit('join', 'vnc-room');
            initWebRTC();
        };
    </script>
</body>
</html>
