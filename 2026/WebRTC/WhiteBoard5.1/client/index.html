<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRTC Click Sync</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .boxes { display: flex; justify-content: center; width: 100%; max-width: 1000px; margin-top: 20px; }
        .box-container { width: 100%; text-align: center; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: 500px; border: 1px solid #ccc; border-radius: 5px; cursor: crosshair; touch-action: none; background: #fff; box-sizing: border-box; }
        canvas.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 5px; margin: 5px; }
        #logArea { width: 100%; max-width: 1000px; height: 150px; margin-top: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: monospace; resize: vertical; box-sizing: border-box; }
    </style>
</head>
<body>
    <div>
        <label><input type="checkbox" id="chkForceTurn"> Force TURN (Relay only)</label>
        <button id="btnConnect" style="background:#28a745">Connect P2P (WebRTC)</button>
    </div>

    <div class="boxes">
        <div class="box-container">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>
    
    <textarea id="logArea" readonly placeholder="Logs will appear here..."></textarea>

    <script type="module" src="./js/client.js"></script>
    <script>
        const logArea = document.getElementById('logArea');
        function appendLog(type, args) {
            const msg = Array.from(args).map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
            logArea.value += `[${type}] ${msg}\n`;
            logArea.scrollTop = logArea.scrollHeight;
        }
        console.log = (...args) => appendLog('INFO', args);
        console.error = (...args) => appendLog('ERROR', args);

        const signalingHost = window.location.hostname === 'localhost' ? 'localhost' : (window.location.hostname || 'signaling');
        const socket = io(`http://${signalingHost}:3000`);

        window.emitSignal = (data) => socket.emit('signal', data);
        socket.on('signal', (data) => { if (window.onRemoteSignal) window.onRemoteSignal(data); });

        const mainCanvas = document.getElementById('mainCanvas');
        const mainCtx = mainCanvas.getContext('2d');

        let localDots = [];
        let remoteDots = [];
        window.localDots = localDots;
        window.remoteDots = remoteDots;

        function setCanvasEnabled(enabled) {
            mainCanvas.classList.toggle('disabled', !enabled);
            console.log(enabled ? "Drawing enabled" : "Drawing disabled");
        }
        window.setCanvasEnabled = setCanvasEnabled;

        function initCanvas(canvas) {
            canvas.width = canvas.clientWidth || 800;
            canvas.height = canvas.clientHeight || 500;
        }
        window.onresize = () => { initCanvas(mainCanvas); };

        function addDot(list, x, y, color) {
            list.push({ x, y, color, startTime: Date.now() });
        }

        function animate() {
            const now = Date.now();
            const FADE_DURATION = 60000;
            if (mainCanvas.width === 0) initCanvas(mainCanvas);
            
            mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

            const drawDots = (dots, updateFn) => {
                const filtered = dots.filter(dot => {
                    const elapsed = now - dot.startTime;
                    if (elapsed >= FADE_DURATION) return false;
                    mainCtx.globalAlpha = 1.0 - (elapsed / FADE_DURATION);
                    mainCtx.fillStyle = dot.color;
                    mainCtx.beginPath();
                    mainCtx.arc(dot.x, dot.y, 10, 0, Math.PI * 2);
                    mainCtx.fill();
                    return true;
                });
                updateFn(filtered);
            };

            drawDots(localDots, (v) => { localDots = v; window.localDots = v; });
            drawDots(remoteDots, (v) => { remoteDots = v; window.remoteDots = v; });

            requestAnimationFrame(animate);
        }
        animate();

        window.drawRemotePoint = (xRel, yRel) => {
            addDot(remoteDots, xRel * mainCanvas.width, yRel * mainCanvas.height, "#d83b01");
        };

        let isDrawing = false;
        function handleMove(e) {
            if (!isDrawing) return;
            
            let xAbs, yAbs;
            const rect = mainCanvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                xAbs = (e.touches[0].clientX - rect.left - mainCanvas.clientLeft);
                yAbs = (e.touches[0].clientY - rect.top - mainCanvas.clientTop);
            } else {
                xAbs = (e.clientX - rect.left - mainCanvas.clientLeft);
                yAbs = (e.clientY - rect.top - mainCanvas.clientTop);
            }
            
            const scaleX = mainCanvas.width / mainCanvas.clientWidth;
            const scaleY = mainCanvas.height / mainCanvas.clientHeight;
            xAbs *= scaleX;
            yAbs *= scaleY;

            const xRel = xAbs / mainCanvas.width;
            const yRel = yAbs / mainCanvas.height;
            
            addDot(localDots, xAbs, yAbs, "#0078d4");
            if (window.webrtcController) window.webrtcController.sendPoint(xRel, yRel);
        }

        mainCanvas.onmousedown = (e) => { isDrawing = true; handleMove(e); };
        window.onmouseup = () => { isDrawing = false; };
        mainCanvas.onmousemove = handleMove;
        mainCanvas.ontouchstart = (e) => { isDrawing = true; handleMove(e); if(e.cancelable) e.preventDefault(); };
        mainCanvas.ontouchmove = (e) => { handleMove(e); if(e.cancelable) e.preventDefault(); };
        mainCanvas.ontouchend = () => { isDrawing = false; };

        window.onload = () => {
            initCanvas(mainCanvas);
            setCanvasEnabled(false);
            socket.emit('join', 'demo-room');
            document.getElementById('btnConnect').onclick = () => window.webrtcController.connectP2P();
        };
    </script>
</body>
</html>
