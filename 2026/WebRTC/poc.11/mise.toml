[tasks."up.server"]
description = "Start the server environment"
run = "docker compose -f docker-compose.server.yml up -d --build"

[tasks."down.server"]
description = "Stop the server environment"
run = "docker compose -f docker-compose.server.yml down"

[tasks."up.client"]
description = "Start the client test environment"
run = "docker compose -f docker-compose.client.yml up -d --build"

[tasks."down.client"]
description = "Stop the client test environment"
run = "docker compose -f docker-compose.client.yml down"

[tasks.up]
description = "Start all services"
run = "docker compose -f docker-compose.server.yml -f docker-compose.client.yml up -d --build"

[tasks.down]
description = "Stop and remove all containers"
run = "docker compose -f docker-compose.server.yml -f docker-compose.client.yml down"

[tasks.ps]
description = "Start all services"
run = "docker compose -f docker-compose.server.yml -f docker-compose.client.yml ps"
