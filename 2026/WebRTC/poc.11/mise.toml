[tasks.server]
description = "Start the server environment"
run = "docker compose -f docker-compose.server.yml up -d --build"

[tasks.client]
description = "Start the client test environment"
run = "docker compose -f docker-compose.client.yml up --build"

[tasks.up]
description = "Start all services"
run = "docker compose -f docker-compose.server.yml -f docker-compose.client.yml up -d --build"

[tasks.down]
description = "Stop and remove all containers"
run = "docker compose -f docker-compose.server.yml -f docker-compose.client.yml down"
